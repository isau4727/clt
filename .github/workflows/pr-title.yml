name: PR Title Validation

on:
  pull_request:
    types: [opened, edited, reopened]

jobs:
  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check PR title format
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: '--allowedTools "Bash(gh pr edit*)" "Bash(git diff*)" "Bash(git log*)"'
          show_full_output: true
          prompt: |
            You already have all the information you need below. Do NOT run gh pr view or any other command to fetch PR details.

            PR number: ${{ github.event.pull_request.number }}
            Current title: ${{ github.event.pull_request.title }}
            Branch name: ${{ github.head_ref }}

            Check if the PR title follows the format: [TL-XXX] Description

            Rules:
            1. Title MUST match the pattern: [TL-XXX] <description>
            2. Extract the ticket number from the branch name (e.g. branch "TL-689-some-feature" → "[TL-689]")
            3. If the title already matches the format, do nothing — just confirm it's valid
            4. If the title does NOT match, fix it using: gh pr edit ${{ github.event.pull_request.number }} --title "[TL-XXX] description"
            5. If the branch name does not contain a TL-XXX ticket number, look at the actual code changes (git diff, changed files) to understand what the PR does, and create a descriptive title based on that
            6. Keep the existing description from the title if it makes sense, otherwise generate one from the changes
            7. ALWAYS run the gh pr edit command if the title needs fixing — do not ask for approval or suggest manual commands
